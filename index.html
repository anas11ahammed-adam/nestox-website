<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nestox Builders — Crafting Premium Spaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b3e;--gold:#b8955a;--gold2:#d4b07a;--cream:#f5f2ec;--white:#fff;--ink:#111;--muted:#7a7670;--border:rgba(184,149,90,.22);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:multiply;top:0;left:0;transition:transform .15s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;top:0;left:0;transition:width .3s,height .3s;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:26px 60px;display:flex;align-items:center;justify-content:space-between;transition:all .5s;}
nav.scrolled{background:rgba(255,255,255,.97);backdrop-filter:blur(14px);padding:16px 60px;border-bottom:1px solid var(--border);box-shadow:0 2px 24px rgba(0,0,0,.06);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;letter-spacing:.04em;color:var(--ink);text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-logo img{height:42px;object-fit:contain;}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;position:relative;transition:color .3s;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s;}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-links a.active{color:var(--gold);}
.nav-cta{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--white);background:var(--navy);padding:12px 28px;text-decoration:none;transition:background .3s;}
.nav-cta:hover{background:var(--gold);}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.nav-ham span{width:24px;height:1.5px;background:var(--ink);display:block;transition:.3s;}

/* MOBILE MENU */
.mob-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:36px;}
.mob-menu.open{display:flex;}
.mob-close{position:absolute;top:28px;right:28px;font-size:1.5rem;cursor:pointer;background:none;border:none;color:var(--ink);}
.mob-menu a{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--ink);text-decoration:none;transition:color .3s;}
.mob-menu a:hover{color:var(--gold);}

/* HERO */
.hero{height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;background:var(--cream);}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:120px 60px 80px;position:relative;z-index:2;}
.hero-eyebrow{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;opacity:0;animation:fadeUp .8s .3s forwards;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,5vw,5.5rem);font-weight:300;line-height:1.08;margin-bottom:32px;opacity:0;animation:fadeUp .8s .5s forwards;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-desc{font-size:.93rem;color:var(--muted);line-height:1.85;max-width:400px;margin-bottom:48px;opacity:0;animation:fadeUp .8s .7s forwards;font-weight:300;}
.hero-actions{display:flex;gap:20px;align-items:center;opacity:0;animation:fadeUp .8s .9s forwards;}
.btn-primary{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);background:var(--navy);padding:15px 34px;text-decoration:none;transition:background .3s,transform .2s;display:inline-block;}
.btn-primary:hover{background:var(--gold);transform:translateY(-2px);}
.btn-ghost{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:color .3s,border-color .3s;}
.btn-ghost:hover{color:var(--gold);border-color:var(--gold);}
.hero-right{position:relative;overflow:hidden;}
.hero-img-wrap{position:absolute;inset:0;clip-path:polygon(8% 0,100% 0,100% 100%,0 100%);}
.hero-bg{width:100%;height:100%;background-size:cover;background-position:center;transform:scale(1.06);animation:zoomOut 8s ease forwards;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,27,62,.18),rgba(184,149,90,.07));}
.hero-stats{position:absolute;bottom:60px;left:60px;display:flex;gap:48px;opacity:0;animation:fadeUp .8s 1.1s forwards;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--ink);line-height:1;}
.stat-num sup{font-size:1.1rem;color:var(--gold);}
.stat-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* MARQUEE */
.marquee-wrap{background:var(--navy);padding:16px 0;overflow:hidden;}
.marquee-track{display:flex;animation:marquee 22s linear infinite;white-space:nowrap;}
.marquee-item{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:rgba(255,255,255,.5);padding:0 28px;letter-spacing:.1em;flex-shrink:0;}
.marquee-item .dot{color:var(--gold);margin:0 14px;}

/* SHARED SECTION STYLES */
.sec-eyebrow{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.sec-eyebrow::before{content:'';width:36px;height:1px;background:var(--gold);}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,3.2vw,3.2rem);font-weight:300;line-height:1.15;margin-bottom:28px;letter-spacing:-.01em;}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-body{font-size:.9rem;color:var(--muted);line-height:1.9;margin-bottom:20px;font-weight:300;}

/* ABOUT PREVIEW */
.about-prev{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;align-items:center;}
.about-media{position:relative;height:100%;min-height:560px;}
.about-img{position:absolute;inset:0;background-size:cover;background-position:center;}
.about-badge{position:absolute;bottom:60px;right:-40px;background:var(--white);padding:30px 36px;box-shadow:0 20px 60px rgba(0,0,0,.09);z-index:3;}
.about-badge-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:var(--gold);line-height:1;}
.about-badge-text{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.about-content{padding:80px 80px 80px 90px;}
.pillars{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:40px;border:1px solid var(--border);}
.pillar{background:var(--white);padding:24px 20px;transition:background .3s;}
.pillar:hover{background:var(--cream);}
.pillar-icon{font-size:1.2rem;margin-bottom:8px;color:var(--gold);}
.pillar-title{font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:5px;}
.pillar-desc{font-size:.79rem;color:var(--muted);line-height:1.65;font-weight:300;}

/* SERVICES PREVIEW */
.services-sec{padding:120px 60px;background:var(--navy);position:relative;overflow:hidden;}
.services-sec::before{content:'NESTOX';position:absolute;font-family:'Cormorant Garamond',serif;font-size:22vw;font-weight:600;color:rgba(255,255,255,.025);bottom:-4vw;left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none;}
.svc-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:64px;}
.svc-header .sec-eyebrow{color:var(--gold2);}
.svc-header .sec-eyebrow::before{background:var(--gold2);}
.svc-header .sec-title{color:var(--white);margin-bottom:0;}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.06);}
.svc-card{background:var(--navy);padding:44px 36px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;transition:border-color .4s;cursor:pointer;text-decoration:none;display:block;}
.svc-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .4s;transform-origin:left;}
.svc-card:hover::before{transform:scaleX(1);}
.svc-num{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--gold);margin-bottom:28px;opacity:.6;letter-spacing:.1em;}
.svc-title{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:400;color:var(--white);margin-bottom:14px;line-height:1.2;transition:color .3s;}
.svc-card:hover .svc-title{color:var(--gold2);}
.svc-desc{font-size:.8rem;color:rgba(255,255,255,.38);line-height:1.8;font-weight:300;margin-bottom:28px;}
.svc-arrow{color:var(--gold);font-size:1rem;transition:transform .3s;display:inline-block;}
.svc-card:hover .svc-arrow{transform:translateX(8px);}

/* PROJECTS PREVIEW */
.projects-sec{padding:120px 60px;background:var(--white);}
.proj-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.proj-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:4/5;text-decoration:none;}
.proj-card.large{grid-column:span 2;aspect-ratio:auto;min-height:440px;}
.proj-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform .7s cubic-bezier(.25,.46,.45,.94);}
.proj-card:hover .proj-bg{transform:scale(1.06);}
.proj-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(13,27,62,.88) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:32px;opacity:0;transition:opacity .4s;}
.proj-card:hover .proj-overlay{opacity:1;}
.proj-tag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px;}
.proj-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--white);margin-bottom:4px;}
.proj-loc{font-size:.78rem;color:rgba(255,255,255,.5);font-weight:300;}

/* PROCESS */
.process-sec{padding:120px 60px;background:var(--cream);}
.process-header{text-align:center;max-width:600px;margin:0 auto 80px;}
.process-header .sec-eyebrow{justify-content:center;}
.process-steps{display:grid;grid-template-columns:repeat(4,1fr);position:relative;}
.process-steps::before{content:'';position:absolute;top:27px;left:12.5%;right:12.5%;height:1px;background:var(--border);}
.process-step{text-align:center;padding:0 22px;}
.step-dot{width:54px;height:54px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;background:var(--cream);position:relative;z-index:2;transition:all .3s;}
.process-step:hover .step-dot{background:var(--gold);border-color:var(--gold);}
.step-num{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold);transition:color .3s;}
.process-step:hover .step-num{color:var(--white);}
.step-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:10px;}
.step-desc{font-size:.79rem;color:var(--muted);line-height:1.7;font-weight:300;}

/* TESTIMONIALS */
.testi-sec{padding:120px 60px;background:var(--white);}
.testi-inner{max-width:1100px;margin:0 auto;}
.testi-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.testi-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.testi-card{background:var(--cream);padding:44px;border:1px solid var(--border);transition:transform .3s,box-shadow .3s;}
.testi-card:hover{transform:translateY(-5px);box-shadow:0 20px 52px rgba(0,0,0,.07);}
.testi-quote{font-family:'Cormorant Garamond',serif;font-size:3.6rem;color:var(--gold);line-height:.5;margin-bottom:24px;opacity:.45;}
.testi-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;font-style:italic;line-height:1.7;color:var(--ink);margin-bottom:28px;}
.testi-author{display:flex;align-items:center;gap:14px;padding-top:22px;border-top:1px solid var(--border);}
.author-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);background:rgba(184,149,90,.12);flex-shrink:0;}
.author-name{font-size:.83rem;font-weight:500;}
.author-role{font-size:.7rem;color:var(--muted);margin-top:2px;}
.stars{color:var(--gold);font-size:.76rem;margin-bottom:6px;letter-spacing:2px;}

/* BLOG */
.blog-sec{padding:120px 60px;background:var(--cream);}
.blog-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.blog-card{background:var(--white);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;}
.blog-card:hover{transform:translateY(-5px);box-shadow:0 20px 52px rgba(0,0,0,.07);}
.blog-img{width:100%;height:220px;background-size:cover;background-position:center;background-color:var(--cream);}
.blog-body{padding:28px;}
.blog-tag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.blog-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;line-height:1.3;margin-bottom:12px;}
.blog-excerpt{font-size:.8rem;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:16px;}
.blog-meta{font-size:.7rem;color:var(--muted);margin-bottom:14px;}
.blog-rm{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);border:none;border-bottom:1px solid var(--navy);padding-bottom:2px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;transition:color .3s,border-color .3s;}
.blog-rm:hover{color:var(--gold);border-color:var(--gold);}

/* BLOG MODAL */
.blog-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(13,27,62,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:24px;}
.blog-modal.open{display:flex;}
.bm-inner{background:var(--white);max-width:780px;width:100%;max-height:90vh;overflow-y:auto;padding:56px;}
.bm-close{display:block;margin-bottom:24px;background:var(--navy);color:var(--white);border:none;padding:9px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;}
.bm-img{width:100%;height:300px;background-size:cover;background-position:center;margin-bottom:32px;}
.bm-tag{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.bm-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;line-height:1.2;margin-bottom:16px;}
.bm-meta{font-size:.75rem;color:var(--muted);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.bm-content{font-size:.9rem;line-height:1.9;color:var(--ink);font-weight:300;white-space:pre-wrap;}

/* CONTACT SECTION — NO FORM */
.contact-sec{background:var(--navy);}
.contact-top{display:grid;grid-template-columns:1fr 1fr 1fr;min-height:60vh;}
.contact-info-col{padding:80px 60px;border-right:1px solid rgba(255,255,255,.07);}
.contact-info-col:last-child{border-right:none;}
.contact-info-col .sec-eyebrow{color:var(--gold2);}
.contact-info-col .sec-eyebrow::before{background:var(--gold2);}
.contact-info-col .sec-title{color:var(--white);}
.c-detail{margin-top:36px;display:flex;flex-direction:column;gap:28px;}
.c-item{display:flex;gap:16px;align-items:flex-start;}
.c-icon{width:44px;height:44px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;color:var(--gold);}
.c-label{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.c-value{font-size:.84rem;color:rgba(255,255,255,.55);line-height:1.75;font-weight:300;}
.c-value a{color:rgba(255,255,255,.55);text-decoration:none;transition:color .3s;}
.c-value a:hover{color:var(--gold);}
.contact-map{width:100%;height:380px;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.contact-map iframe{width:100%;height:100%;border:none;filter:grayscale(30%) invert(90%) hue-rotate(180deg) brightness(0.85) contrast(1.1);}
.contact-map-placeholder{text-align:center;color:rgba(255,255,255,.3);}
.contact-map-placeholder .map-icon{font-size:3rem;margin-bottom:16px;display:block;}
.contact-map-placeholder p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;}
.contact-cta-strip{background:var(--gold);padding:40px 60px;display:flex;align-items:center;justify-content:space-between;}
.cta-strip-text{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--white);}
.cta-strip-text em{font-style:italic;}
.cta-strip-btns{display:flex;gap:16px;}
.cta-btn-white{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);background:var(--white);padding:14px 32px;text-decoration:none;transition:all .3s;}
.cta-btn-white:hover{background:var(--navy);color:var(--white);}
.cta-btn-outline{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);border:1px solid rgba(255,255,255,.5);padding:14px 32px;text-decoration:none;transition:all .3s;}
.cta-btn-outline:hover{background:rgba(255,255,255,.15);}
.whatsapp-float{position:fixed;bottom:32px;right:32px;z-index:100;width:56px;height:56px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);text-decoration:none;transition:transform .3s,box-shadow .3s;}
.whatsapp-float:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.5);}
.whatsapp-float svg{width:28px;height:28px;fill:white;}

/* FOOTER */
footer{background:var(--navy);padding:80px 60px 36px;border-top:1px solid rgba(255,255,255,.06);}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:56px;margin-bottom:60px;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:600;color:var(--white);letter-spacing:.04em;margin-bottom:18px;display:block;text-decoration:none;}
.footer-logo span{color:var(--gold);}
.footer-logo img{height:44px;object-fit:contain;}
.footer-tagline{font-size:.81rem;color:rgba(255,255,255,.35);line-height:1.85;font-weight:300;max-width:280px;}
.footer-socials{display:flex;gap:10px;margin-top:28px;}
.social-btn{width:38px;height:38px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.38);text-decoration:none;font-size:.82rem;transition:all .3s;}
.social-btn:hover{border-color:var(--gold);color:var(--gold);}
.footer-col-title{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:11px;}
.footer-links a{font-size:.81rem;color:rgba(255,255,255,.38);text-decoration:none;transition:color .3s;font-weight:300;}
.footer-links a:hover{color:var(--gold);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:28px;border-top:1px solid rgba(255,255,255,.06);}
.footer-copy,.footer-reg{font-size:.73rem;color:rgba(255,255,255,.24);font-weight:300;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .8s,transform .8s;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:.12s;}
.reveal-delay-2{transition-delay:.24s;}
.reveal-delay-3{transition-delay:.36s;}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes zoomOut{from{transform:scale(1.08);}to{transform:scale(1);}}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* RESPONSIVE */
@media(max-width:1100px){
  .hero{grid-template-columns:1fr;}.hero-right{display:none;}.hero-left{padding:130px 40px 80px;}.hero-stats{left:40px;}
  .about-prev{grid-template-columns:1fr;}.about-media{min-height:400px;}.about-badge{right:20px;bottom:20px;}.about-content{padding:60px 40px;}
  .svc-grid{grid-template-columns:1fr 1fr;}.proj-grid{grid-template-columns:1fr 1fr;}.proj-card.large{grid-column:span 2;}
  .contact-top{grid-template-columns:1fr;}.footer-top{grid-template-columns:1fr 1fr;gap:36px;}
  .process-steps{grid-template-columns:1fr 1fr;gap:36px;}.process-steps::before{display:none;}
}
@media(max-width:768px){

function renderFooter(){
  const f=D.footer;const b=D.brand;
  const logoHtml=b.logoUrl?`<a href="index.html" class="footer-logo"><img src="${b.logoUrl}" alt="${b.logoText}"></a>`:`<a href="index.html" class="footer-logo">${b.logoText}<span>.</span></a>`;
  const navLinks=D.nav.links.map(l=>`<li><a href="${l.href}">${l.label}</a></li>`).join('');
  const svcLinks=D.services.slice(0,5).map(s=>`<li><a href="services.html">${s.title}</a></li>`).join('');
  return `<footer>
    <div class="footer-top">
      <div>${logoHtml}<p class="footer-tagline">${f.tagline}</p>
        <div class="footer-socials">
          <a href="${f.social.linkedin}" class="social-btn" target="_blank">in</a>

      <div><div class="footer-col-title">Services</div><ul class="footer-links">${svcLinks}</ul></div>
      <div><div class="footer-col-title">Contact</div><ul class="footer-links">

// ── BLOG MODAL ───────────────────────────────────────────────────────────────────
function openBM(id){
  const b=D.blogs.find(x=>x.id===id);if(!b)return;
  const img=document.getElementById('bmImg');
  img.style.display=b.imageUrl?'block':'none';
  if(b.imageUrl)img.style.backgroundImage=`url('${b.imageUrl}')`;
  document.getElementById('bmTag').textContent=b.category||'Insights';
  document.getElementById('bmTitle').textContent=b.title;
  document.getElementById('bmMeta').textContent=(b.author||'Nestox Team')+' · '+(b.date||'');
  document.getElementById('bmContent').textContent=b.content||'';
  document.getElementById('blogModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeBM(){document.getElementById('blogModal').classList.remove('open');document.body.style.overflow='';}

// ── CURSOR ───────────────────────────────────────────────────────────────────────
function initCursor(){
  const c=document.getElementById('cursor'),r=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;c.style.transform=`translate(${mx-4}px,${my-4}px)`;});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;r.style.transform=`translate(${rx-18}px,${ry-18}px)`;requestAnimationFrame(loop);})();
  document.addEventListener('mouseover',e=>{
    if(e.target.closest('a,button,.svc-card,.proj-card,.blog-card,.testi-card')){r.style.width='58px';r.style.height='58px';}
    else{r.style.width='36px';r.style.height='36px';}
  });
}

function initScrollReveal(){
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}
function initParallax(){
  window.addEventListener('scroll',()=>{
    document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60);
    const bg=document.getElementById('heroBg');
    if(bg)bg.style.transform=`scale(1.04) translateY(${window.scrollY*.12}px)`;
  });
}
function openMob(){document.getElementById('mobMenu').classList.add('open');}
function closeMob(){document.getElementById('mobMenu').classList.remove('open');}
window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60);});

window.addEventListener('DOMContentLoaded',()=>{
  renderNav();
  renderHome();
  initCursor();
});
</script>

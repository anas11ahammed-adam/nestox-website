<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nestox Builders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b3e;--navy2:#162347;
  --gold:#b8955a;--gold2:#d4b07a;
  --cream:#f5f2ec;--white:#ffffff;
  --ink:#111111;--muted:#7a7670;
  --border:rgba(184,149,90,.22);--nborder:rgba(255,255,255,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden;cursor:none;}

/* CURSOR */
.cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:multiply;top:0;left:0;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;top:0;left:0;transition:width .3s,height .3s;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:26px 60px;display:flex;align-items:center;justify-content:space-between;transition:all .5s;}
nav.scrolled{background:rgba(255,255,255,.97);backdrop-filter:blur(14px);padding:16px 60px;border-bottom:1px solid var(--border);box-shadow:0 2px 24px rgba(0,0,0,.06);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;letter-spacing:.04em;color:var(--ink);text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-logo img{height:42px;object-fit:contain;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;position:relative;transition:color .3s;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s;}
.nav-links a:hover::after{width:100%;}
.nav-cta{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--white);background:var(--navy);padding:12px 28px;text-decoration:none;transition:background .3s,transform .2s;}
.nav-cta:hover{background:var(--gold);transform:translateY(-1px);}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.nav-ham span{width:24px;height:1.5px;background:var(--ink);display:block;transition:.3s;}

/* MOBILE MENU */
.mob-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:36px;}
.mob-menu.open{display:flex;}
.mob-close{position:absolute;top:28px;right:28px;font-size:1.5rem;cursor:pointer;background:none;border:none;color:var(--ink);}
.mob-menu a{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--ink);text-decoration:none;transition:color .3s;}
.mob-menu a:hover{color:var(--gold);}

/* HERO */
.hero{height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden;background:var(--cream);}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:120px 60px 80px;position:relative;z-index:2;}
.hero-eyebrow{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;opacity:0;animation:fadeUp .8s .3s forwards;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,5vw,5.5rem);font-weight:300;line-height:1.08;margin-bottom:32px;opacity:0;animation:fadeUp .8s .5s forwards;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-desc{font-size:.93rem;color:var(--muted);line-height:1.85;max-width:400px;margin-bottom:48px;opacity:0;animation:fadeUp .8s .7s forwards;font-weight:300;}
.hero-actions{display:flex;gap:20px;align-items:center;opacity:0;animation:fadeUp .8s .9s forwards;}
.btn-primary{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);background:var(--navy);padding:15px 34px;text-decoration:none;transition:background .3s,transform .2s;display:inline-block;}
.btn-primary:hover{background:var(--gold);transform:translateY(-2px);}
.btn-ghost{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:color .3s,border-color .3s;}
.btn-ghost:hover{color:var(--gold);border-color:var(--gold);}
.hero-right{position:relative;overflow:hidden;}
.hero-img-wrap{position:absolute;inset:0;clip-path:polygon(8% 0,100% 0,100% 100%,0 100%);}
.hero-bg{width:100%;height:100%;background-size:cover;background-position:center;transform:scale(1.06);animation:zoomOut 8s ease forwards;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,27,62,.18),rgba(184,149,90,.07));}
.hero-stats{position:absolute;bottom:60px;left:60px;display:flex;gap:48px;opacity:0;animation:fadeUp .8s 1.1s forwards;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--ink);line-height:1;}
.stat-num sup{font-size:1.1rem;color:var(--gold);}
.stat-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* MARQUEE */
.marquee-wrap{background:var(--navy);padding:16px 0;overflow:hidden;}
.marquee-track{display:flex;animation:marquee 22s linear infinite;white-space:nowrap;}
.marquee-item{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:rgba(255,255,255,.5);padding:0 28px;letter-spacing:.1em;flex-shrink:0;}
.marquee-item .dot{color:var(--gold);margin:0 14px;}

/* ABOUT */
.about{display:grid;grid-template-columns:1fr 1fr;min-height:88vh;align-items:center;}
.about-media{position:relative;height:100%;min-height:600px;}
.about-img{position:absolute;inset:0;background-size:cover;background-position:center;}
.about-badge{position:absolute;bottom:60px;right:-40px;background:var(--white);padding:30px 36px;box-shadow:0 20px 60px rgba(0,0,0,.09);z-index:3;}
.about-badge-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:var(--gold);line-height:1;}
.about-badge-text{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.about-content{padding:80px 80px 80px 90px;}
.section-eyebrow{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.section-eyebrow::before{content:'';width:36px;height:1px;background:var(--gold);}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,3.2vw,3.2rem);font-weight:300;line-height:1.15;margin-bottom:28px;letter-spacing:-.01em;}
.section-title em{font-style:italic;color:var(--gold);}
.section-body{font-size:.9rem;color:var(--muted);line-height:1.9;margin-bottom:20px;font-weight:300;}
.about-pillars{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:48px;border:1px solid var(--border);}
.pillar{background:var(--white);padding:26px 22px;transition:background .3s;}
.pillar:hover{background:var(--cream);}
.pillar-icon{font-size:1.3rem;margin-bottom:10px;color:var(--gold);}
.pillar-title{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:6px;}
.pillar-desc{font-size:.81rem;color:var(--muted);line-height:1.65;font-weight:300;}

/* SERVICES */
.services{padding:120px 60px;background:var(--navy);position:relative;overflow:hidden;}
.services::before{content:'NESTOX';position:absolute;font-family:'Cormorant Garamond',serif;font-size:22vw;font-weight:600;color:rgba(255,255,255,.025);bottom:-4vw;left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none;}
.services-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:72px;}
.services-header .section-eyebrow{color:var(--gold2);}
.services-header .section-eyebrow::before{background:var(--gold2);}
.services-header .section-title{color:var(--white);margin-bottom:0;}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.06);}
.service-card{background:var(--navy);padding:48px 40px;border:1px solid rgba(255,255,255,.06);cursor:pointer;position:relative;overflow:hidden;transition:border-color .4s;}
.service-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .4s;transform-origin:left;}
.service-card:hover::before{transform:scaleX(1);}
.service-num{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--gold);margin-bottom:32px;opacity:.6;letter-spacing:.1em;}
.service-title{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:400;color:var(--white);margin-bottom:16px;line-height:1.2;transition:color .3s;}
.service-card:hover .service-title{color:var(--gold2);}
.service-desc{font-size:.82rem;color:rgba(255,255,255,.38);line-height:1.8;font-weight:300;margin-bottom:32px;}
.service-arrow{color:var(--gold);font-size:1.1rem;transition:transform .3s;display:inline-block;}
.service-card:hover .service-arrow{transform:translateX(8px);}

/* PROJECTS */
.projects{padding:120px 60px;background:var(--white);}
.projects-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.projects-tabs{display:flex;gap:8px;}
.tab-btn{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .3s;font-family:'DM Sans',sans-serif;color:var(--muted);}
.tab-btn.active,.tab-btn:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.project-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:4/5;}
.project-card.large{grid-column:span 2;aspect-ratio:auto;min-height:440px;}
.project-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform .7s cubic-bezier(.25,.46,.45,.94);}
.project-card:hover .project-bg{transform:scale(1.06);}
.project-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(13,27,62,.88) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:32px;opacity:0;transition:opacity .4s;}
.project-card:hover .project-overlay{opacity:1;}
.project-tag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px;}
.project-name{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:300;color:var(--white);margin-bottom:4px;}
.project-location{font-size:.78rem;color:rgba(255,255,255,.5);font-weight:300;}

/* PROCESS */
.process{padding:120px 60px;background:var(--cream);}
.process-header{text-align:center;max-width:600px;margin:0 auto 80px;}
.process-header .section-eyebrow{justify-content:center;}
.process-steps{display:grid;grid-template-columns:repeat(4,1fr);position:relative;}
.process-steps::before{content:'';position:absolute;top:27px;left:12.5%;right:12.5%;height:1px;background:var(--border);}
.process-step{text-align:center;padding:0 22px;}
.step-dot{width:54px;height:54px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;background:var(--cream);position:relative;z-index:2;transition:all .3s;}
.process-step:hover .step-dot{background:var(--gold);border-color:var(--gold);}
.step-num{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--gold);transition:color .3s;}
.process-step:hover .step-num{color:var(--white);}
.step-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:400;margin-bottom:10px;}
.step-desc{font-size:.8rem;color:var(--muted);line-height:1.7;font-weight:300;}

/* TESTIMONIALS */
.testimonials{padding:120px 60px;background:var(--white);}
.testi-inner{max-width:1100px;margin:0 auto;}
.testi-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.testimonials-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.testimonial-card{background:var(--cream);padding:44px;border:1px solid var(--border);transition:transform .3s,box-shadow .3s;}
.testimonial-card:hover{transform:translateY(-5px);box-shadow:0 20px 52px rgba(0,0,0,.07);}
.testi-quote{font-family:'Cormorant Garamond',serif;font-size:3.6rem;color:var(--gold);line-height:.5;margin-bottom:24px;opacity:.45;}
.testi-text{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;font-style:italic;line-height:1.7;color:var(--ink);margin-bottom:28px;}
.testi-author{display:flex;align-items:center;gap:14px;padding-top:22px;border-top:1px solid var(--border);}
.author-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);background:rgba(184,149,90,.12);flex-shrink:0;}
.author-name{font-size:.83rem;font-weight:500;letter-spacing:.04em;}
.author-role{font-size:.7rem;color:var(--muted);margin-top:2px;letter-spacing:.06em;}
.stars{color:var(--gold);font-size:.78rem;margin-bottom:6px;letter-spacing:2px;}

/* BLOG */
.blog{padding:120px 60px;background:var(--cream);}
.blog-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.blog-card{background:var(--white);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;}
.blog-card:hover{transform:translateY(-5px);box-shadow:0 20px 52px rgba(0,0,0,.07);}
.blog-img{width:100%;height:220px;background-size:cover;background-position:center;background-color:var(--cream);}
.blog-body{padding:28px;}
.blog-tag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.blog-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:400;line-height:1.3;margin-bottom:12px;}
.blog-excerpt{font-size:.82rem;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:20px;}
.blog-meta{font-size:.7rem;color:var(--muted);letter-spacing:.06em;display:flex;gap:16px;margin-bottom:16px;}
.blog-read-more{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);border:none;border-bottom:1px solid var(--navy);padding-bottom:2px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;transition:color .3s,border-color .3s;}
.blog-read-more:hover{color:var(--gold);border-color:var(--gold);}

/* BLOG MODAL */
.blog-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(13,27,62,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:24px;}
.blog-modal.open{display:flex;}
.blog-modal-inner{background:var(--white);max-width:780px;width:100%;max-height:90vh;overflow-y:auto;padding:56px;}
.bm-close-btn{display:block;margin-bottom:24px;background:var(--navy);color:var(--white);border:none;padding:9px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;}
.bm-img{width:100%;height:320px;background-size:cover;background-position:center;margin-bottom:32px;}
.bm-tag{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.bm-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;line-height:1.2;margin-bottom:16px;}
.bm-meta{font-size:.75rem;color:var(--muted);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.bm-content{font-size:.92rem;line-height:1.9;color:var(--ink);font-weight:300;white-space:pre-wrap;}

/* CONTACT */
.contact{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;}
.contact-left{background:var(--navy);padding:100px 72px;display:flex;flex-direction:column;justify-content:center;}
.contact-left .section-eyebrow{color:var(--gold2);}
.contact-left .section-eyebrow::before{background:var(--gold2);}
.contact-left .section-title{color:var(--white);}
.contact-left .section-body{color:rgba(255,255,255,.42);}
.contact-info{margin-top:44px;display:flex;flex-direction:column;gap:24px;}
.contact-item{display:flex;gap:18px;align-items:flex-start;}
.contact-icon{width:42px;height:42px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.95rem;}
.contact-item-label{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.contact-item-text{font-size:.82rem;color:rgba(255,255,255,.48);line-height:1.7;font-weight:300;}
.contact-right{background:var(--cream);padding:100px 72px;display:flex;flex-direction:column;justify-content:center;}
.contact-form{display:flex;flex-direction:column;gap:18px;margin-top:32px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.form-group{display:flex;flex-direction:column;gap:7px;}
.form-label{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.form-input,.form-select,.form-textarea{background:var(--white);border:1px solid var(--border);padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:.87rem;color:var(--ink);outline:none;transition:border-color .3s;font-weight:300;appearance:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-textarea{resize:vertical;min-height:110px;}
.form-submit{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);background:var(--navy);padding:16px 36px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .3s,transform .2s;align-self:flex-start;}
.form-submit:hover{background:var(--gold);transform:translateY(-2px);}

/* FOOTER */
footer{background:var(--navy);padding:80px 60px 36px;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:56px;margin-bottom:60px;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:600;color:var(--white);letter-spacing:.04em;margin-bottom:18px;display:block;text-decoration:none;}
.footer-logo span{color:var(--gold);}
.footer-logo img{height:44px;object-fit:contain;}
.footer-tagline{font-size:.81rem;color:rgba(255,255,255,.35);line-height:1.85;font-weight:300;max-width:280px;}
.footer-socials{display:flex;gap:10px;margin-top:28px;}
.social-btn{width:38px;height:38px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.38);text-decoration:none;font-size:.82rem;transition:all .3s;}
.social-btn:hover{border-color:var(--gold);color:var(--gold);}
.footer-col-title{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:11px;}
.footer-links a{font-size:.81rem;color:rgba(255,255,255,.38);text-decoration:none;transition:color .3s;font-weight:300;}
.footer-links a:hover{color:var(--gold);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:28px;border-top:1px solid rgba(255,255,255,.06);}
.footer-copy,.footer-reg{font-size:.73rem;color:rgba(255,255,255,.24);font-weight:300;}

/* CUSTOM PAGE */
.custom-page{padding:160px 60px 120px;min-height:80vh;}
.custom-page-eyebrow{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.custom-page-eyebrow::before{content:'';width:36px;height:1px;background:var(--gold);}
.custom-page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:300;margin-bottom:32px;}
.custom-page-content{font-size:.95rem;line-height:1.9;color:var(--muted);max-width:800px;white-space:pre-wrap;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .8s,transform .8s;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:.12s;}
.reveal-delay-2{transition-delay:.24s;}
.reveal-delay-3{transition-delay:.36s;}
.reveal-delay-4{transition-delay:.48s;}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes zoomOut{from{transform:scale(1.08);}to{transform:scale(1);}}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* RESPONSIVE */
@media(max-width:1100px){
  .hero{grid-template-columns:1fr;}.hero-right{display:none;}.hero-left{padding:130px 40px 80px;}.hero-stats{left:40px;}
  .about{grid-template-columns:1fr;}.about-media{min-height:400px;}.about-badge{right:20px;bottom:20px;}.about-content{padding:60px 40px;}
  .services-grid{grid-template-columns:1fr 1fr;}.projects-grid{grid-template-columns:1fr 1fr;}.project-card.large{grid-column:span 2;}
  .footer-top{grid-template-columns:1fr 1fr;gap:36px;}
}
@media(max-width:768px){
  nav{padding:20px 24px;}nav.scrolled{padding:14px 24px;}
  .nav-links,.nav-cta{display:none;}.nav-ham{display:flex;}

function getNestoxData(){
  try{
    const raw=localStorage.getItem(NESTOX_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const saved=JSON.parse(raw);
    return deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)),saved);
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function deepMerge(t,s){
  if(Array.isArray(s)) return s;
  for(const k in s){
    if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])){
      if(!t[k]) t[k]={};
      deepMerge(t[k],s[k]);
    } else { t[k]=s[k]; }
  }
  return t;
}

function filterProj(type,btn){

}
function openBlogModal(id){
  const b=D.blogs.find(x=>x.id===id); if(!b) return;
  const img=document.getElementById('bmImg');
  if(b.imageUrl){img.style.backgroundImage=`url('${b.imageUrl}')`;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('bmTag').textContent=b.category||'Insights';
  document.getElementById('bmTitle').textContent=b.title;
  document.getElementById('bmMeta').textContent=(b.author||'Nestox Team')+' · '+(b.date||'');
  document.getElementById('bmContent').textContent=b.content||'';
  document.getElementById('blogModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeBlogModal(){
  document.getElementById('blogModal').classList.remove('open');
  document.body.style.overflow='';
}
function showAllBlogs(e){
  e.preventDefault();
  const grid=document.getElementById('blogGrid'); if(!grid) return;
  grid.innerHTML=D.blogs.map((b,i)=>`<div class="blog-card">
    <div class="blog-img" style="background-image:url('${b.imageUrl||''}')"></div>
    <div class="blog-body">
      <div class="blog-tag">${b.category||'Insights'}</div>
      <h3 class="blog-title">${b.title}</h3>
      <p class="blog-excerpt">${b.excerpt||(b.content||'').substring(0,120)}...</p>
      <div class="blog-meta"><span>${b.author||'Nestox Team'}</span><span>${b.date||''}</span></div>
      <button class="blog-read-more" onclick="openBlogModal('${b.id}')">Read More →</button>
    </div>
  </div>`).join('');
}
function handleForm(e){
  e.preventDefault();
  const btn=document.getElementById('formBtn');
  btn.textContent='Sending...';
  setTimeout(()=>{
    btn.textContent='✓ Enquiry Sent!';btn.style.background='#2e6b4a';
    setTimeout(()=>{btn.textContent='Send Enquiry →';btn.style.background='';e.target.reset();},3000);
  },1200);
}
function openMob(){document.getElementById('mobMenu').classList.add('open');}
function closeMob(){document.getElementById('mobMenu').classList.remove('open');}

// ─── CURSOR ────────────────────────────────────────────────────────────────────
function initCursor(){
  const c=document.getElementById('cursor'),r=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    c.style.transform=`translate(${mx-4}px,${my-4}px)`;
  });
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;r.style.transform=`translate(${rx-18}px,${ry-18}px)`;requestAnimationFrame(loop);})();
  document.addEventListener('mouseover',e=>{
    if(e.target.closest('a,button,.service-card,.project-card,.blog-card,.testimonial-card')){r.style.width='58px';r.style.height='58px';}
    else{r.style.width='36px';r.style.height='36px';}
  });
}

// ─── SCROLL ────────────────────────────────────────────────────────────────────
function initScrollReveal(){
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}
function initNavScroll(){
  window.addEventListener('scroll',()=>{
    document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60);
    const bg=document.getElementById('heroBg');
    if(bg) bg.style.transform=`scale(1.04) translateY(${window.scrollY*.13}px)`;
  });
}

window.addEventListener('DOMContentLoaded',boot);
</script>
